{% extends "base.html" %}
{% block title %}Home — MUNDP Portal{% endblock %}

{% block head %}
<style>
/* ── Hero ────────────────────────────────────────────────────── */
.home-hero {
    text-align: center;
    padding: 80px 0 72px;
    animation: heroFadeIn 0.6s ease both;
}
@keyframes heroFadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
}
.home-hero-logo {
    width: 180px;
    height: 180px;
    object-fit: contain;
    display: block;
    margin: 0 auto 36px;
    filter: drop-shadow(0 8px 28px rgba(7,5,77,0.13));
    animation: logoFloat 6s ease-in-out infinite;
}
@keyframes logoFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
}
.home-hero-title {
    font-size: 4.6rem;
    font-weight: 800;
    letter-spacing: -4px;
    color: #07054d;
    margin: 0 0 10px;
    line-height: 1;
}
.home-hero-sub {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(7,5,77,0.38);
    margin: 0 0 28px;
}
.home-hero-line {
    width: 36px;
    height: 2px;
    background: rgba(7,5,77,0.18);
    margin: 0 auto 20px;
    border-radius: 2px;
}
.home-hero-greeting {
    font-size: 1rem;
    color: rgba(7,5,77,0.50);
    margin: 0;
    letter-spacing: 0.01em;
}
.home-hero-greeting strong {
    color: #07054d;
    font-weight: 700;
}

@media (prefers-reduced-motion: reduce) {
    .home-hero     { animation: none; }
    .home-hero-logo { animation: none; }
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 700px) {
    .home-hero-title { font-size: 2.8rem; letter-spacing: -2px; }
    .home-hero { padding: 52px 0 48px; }
    .home-hero-logo { width: 130px; height: 130px; }
}
@media (max-width: 420px) {
    .home-hero-title { font-size: 2.1rem; letter-spacing: -1px; }
    .home-hero-logo { width: 100px; height: 100px; }
}
</style>
{% endblock %}

{% block content %}
<div class="home-hero">
    <img class="home-hero-logo"
         src="{{ url_for('static', filename='img/mydp_world_fix.png') }}"
         alt="MyDP">
    <h1 class="home-hero-title">Welcome to MyDP</h1>
    <p class="home-hero-sub">MUNDP Digital Interface</p>
    <div class="home-hero-line"></div>
    <p class="home-hero-greeting">Hello, <strong>{{ current_user.display_name }}</strong></p>
</div>
{% endblock %}
